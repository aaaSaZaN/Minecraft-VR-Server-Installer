services:
  mc:
    image: itzg/minecraft-server:java17
    container_name: minecraft-server
    network_mode: host  # Bypass Docker NAT — preserves real client IPs for Voice Chat UDP
    environment:
      EULA: "TRUE"
      ONLINE_MODE: "FALSE"
      TYPE: "FORGE"
      VERSION: "1.20.1"
      FORGE_VERSION: "47.4.10"
      MEMORY: "3G" # Рекомендуется 8G для сборки с большим количеством модов и измерений
      ENABLE_RCON: "true"
      RCON_PASSWORD: "ok" # Измените пароль при необходимости
      RCON_PORT: "25575"
    volumes:
      - ./data:/data
    restart: "no"
